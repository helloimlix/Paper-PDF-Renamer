<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirm PDF filename</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="dialog-body">
    <main class="dialog-shell">
      <header class="page-header">
        <h1>Confirm filename</h1>
        <p>Review the suggested paper title before Chrome saves the PDF.</p>
      </header>

      <section class="field-stack">
        <label>
          <span>Original file</span>
          <input id="originalFilename" type="text" readonly>
        </label>

        <label>
          <span>Detected title</span>
          <input id="detectedTitle" type="text" readonly>
        </label>

        <label>
          <span>Authors</span>
          <input id="authors" type="text" readonly>
        </label>

        <label>
          <span>Date</span>
          <input id="paperDate" type="text" readonly>
        </label>

        <label>
          <span>Save as</span>
          <input id="finalFilename" type="text" autocomplete="off">
        </label>

        <label class="check-row">
          <input id="overwrite" type="checkbox">
          <span>Overwrite same-name file</span>
        </label>
      </section>

      <p id="status" class="status-line"></p>

      <footer class="button-row">
        <button id="keepOriginal" class="secondary">Keep original</button>
        <button id="confirmRename" class="primary">Rename PDF</button>
      </footer>
    </main>

    <script src="shared-utils.js"></script>
    <script src="confirm.js"></script>
  </body>
</html>
